name: Period Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: URL Health Check
        uses: Jtalk/url-health-check-action@v5
        with:
          url: https://pokemon-app.the-reason.workers.dev/
